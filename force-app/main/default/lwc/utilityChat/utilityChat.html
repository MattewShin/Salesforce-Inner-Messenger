<template>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <template lwc:if={isChatView}>
                <lightning-button-icon icon-name="utility:back" variant="bare" onclick={handleBack} alternative-text={labels.backAlt}></lightning-button-icon>
                <span class="slds-text-heading_small slds-truncate slds-m-horizontal_small" style="flex:1;" title={currentSessionName}>{currentSessionName}</span>
                <lightning-button-menu
                    class="chat-header-menu"
                    alternative-text={labels.chatMenuAlt}
                    menu-alignment="right"
                    onselect={handleChatMenuSelect}
                    icon-size="x-small">
                    <lightning-menu-item value="participants" label={labels.menuParticipants}></lightning-menu-item>
                    <lightning-menu-item value="invite" label={labels.menuInvite}></lightning-menu-item>
                    <lightning-menu-item value="rename" label={labels.menuRename}></lightning-menu-item>
                    <lightning-menu-item value="download" label={labels.menuDownload}></lightning-menu-item>
                    <lightning-menu-item value="leave" label={labels.menuLeave}></lightning-menu-item>
                    <template lwc:if={canDeleteCurrentSession}>
                        <lightning-menu-item value="delete" label={labels.menuDelete}></lightning-menu-item>
                    </template>
                </lightning-button-menu>
            </template>
            <template lwc:else>
                <span class="slds-text-heading_small">{labels.headerTitle}</span>
                <lightning-button-icon icon-name="utility:add" variant="border-filled" onclick={openNewChatModal} alternative-text={labels.newChatAlt}></lightning-button-icon>
            </template>
        </div>

        <!-- Session List View -->
        <template lwc:if={isListView}>
            <div class="session-list">
                <template for:each={sessions} for:item="session">
                    <div
                        key={session.sessionId}
                        class={session.cssClass}
                        onclick={handleSessionSelect}
                        data-id={session.sessionId}
                        data-name={session.name}
                        data-createdby={session.createdById}>
                        <div class="session-main">
                            <div class="slds-truncate session-name">
                                <lightning-icon icon-name="standard:messaging_session" size="small" class="slds-m-right_x-small"></lightning-icon>
                                {session.name}
                            </div>
                            <div class="slds-truncate session-preview" title={session.lastMessagePreview}>
                                {session.lastMessagePreview}
                            </div>
                        </div>
                        <div class="session-meta">
                            <div class="slds-text-color_weak slds-text-body_small">
                                {session.formattedLastMessageTime}
                            </div>
                            <template lwc:if={session.unreadCount}>
                                <span class="unread-badge">{session.unreadCount}</span>
                            </template>
                            <div class="session-actions">
                                <lightning-button-icon
                                    icon-name={session.pinIcon}
                                    variant="bare"
                                    alternative-text={labels.pinAlt}
                                    title={labels.pinTitle}
                                    data-id={session.sessionId}
                                    data-pinned={session.isPinned}
                                    onclick={togglePin}>
                                </lightning-button-icon>
                                <lightning-button-icon
                                    icon-name={session.muteIcon}
                                    variant="bare"
                                    alternative-text={labels.muteAlt}
                                    title={labels.muteTitle}
                                    data-id={session.sessionId}
                                    data-muted={session.isMuted}
                                    onclick={toggleMute}>
                                </lightning-button-icon>
                            </div>
                        </div>
                    </div>
                </template>
                <template lwc:if={isSessionsEmpty}>
                    <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                        {labels.noSessions}
                    </div>
                </template>
            </div>
        </template>

        <!-- Chat View -->
        <template lwc:if={isChatView}>
            <div class={chatAreaClass}>
                <div class="messages" lwc:ref="messageContainer" onscroll={handleMessagesScroll}>
                    <template for:each={messages} for:item="msg">
                        <!-- Message Wrapper for layout -->
                        <div key={msg.id} class={msg.wrapperClass} data-msg-id={msg.id}>
                            <template lwc:if={msg.isDivider}>
                                <div class="date-divider">
                                    <span class="date-divider-text">{msg.dividerLabel}</span>
                                </div>
                            </template>
                            <template lwc:else>
                                <template lwc:if={msg.isSystem}>
                                    <div class="system-message">
                                        <span class="system-line1">{msg.systemLine1}</span>
                                        <span class="system-line2">{msg.systemLine2}</span>
                                    </div>
                                </template>
                                <template lwc:else>
                                    <!-- Sender Name -->
                                    <template lwc:if={msg.showSender}>
                                        <span class="sender-name">{msg.senderName}</span>
                                    </template>

                                    <div class="bubble-row">
                                        <template lwc:if={msg.isMine}>
                                            <!-- Message Actions (leftmost, before unread count) -->
                                            <template lwc:if={msg.showActions}>
                                                <lightning-button-menu
                                                    class="msg-action-btn"
                                                    icon-name="utility:threedots_vertical"
                                                    variant="bare"
                                                    icon-size="x-small"
                                                    alternative-text={labels.msgMenuAlt}
                                                    menu-alignment={msg.actionsMenuAlignment}
                                                    data-id={msg.id}
                                                    onselect={handleMessageMenuSelect}>
                                                    <lightning-menu-item value="copy" label={labels.msgMenuCopy}></lightning-menu-item>
                                                    <lightning-menu-item value="reply" label={labels.msgMenuReply}></lightning-menu-item>
                                                </lightning-button-menu>
                                            </template>

                                            <!-- Time (Left for Mine) -->
                                            <span class="message-meta-left">
                                                <template lwc:if={msg.showUnreadCount}>
                                                    <span class="read-count">{msg.unreadByOthers}</span>
                                                </template>
                                                <span class="message-time left">{msg.formattedTime}</span>
                                            </span>

                                            <!-- Bubble -->
                                            <div class={msg.bubbleClass}>
                                                <template lwc:if={msg.hasReply}>
                                                    <div class="reply-quote" onclick={handleReplyQuoteClick} data-id={msg.replyToId}>
                                                        <div class="reply-quote-sender">{msg.replyToSenderName}</div>
                                                        <div class="reply-quote-preview">{msg.replyToPreview}</div>
                                                    </div>
                                                </template>
                                                <span>{msg.displayContent}</span>
                                                <!-- Attachment -->
                                                <template lwc:if={msg.attachment}>
                                                    <template lwc:if={msg.attachment.isImage}>
                                                        <button
                                                            class="attachment-image"
                                                            onclick={handlePreviewFile}
                                                            data-id={msg.attachment.docId}
                                                            type="button">
                                                            <img class="attachment-thumb" src={msg.attachment.thumbUrl} alt={msg.attachment.title} />
                                                        </button>
                                                    </template>
                                                    <template lwc:else>
                                                        <button
                                                            class="attachment-file"
                                                            onclick={handlePreviewFile}
                                                            data-id={msg.attachment.docId}
                                                            type="button">
                                                            <lightning-icon icon-name="doctype:attachment" size="xx-small"></lightning-icon>
                                                            <span class="attachment-file-title slds-truncate">{msg.attachment.title}</span>
                                                            <span class="attachment-file-ext">{msg.attachment.extension}</span>
                                                        </button>
                                                    </template>
                                                </template>
                                            </div>
                                        </template>

                                        <template lwc:else>
                                            <!-- Bubble -->
                                            <div class={msg.bubbleClass}>
                                                <template lwc:if={msg.hasReply}>
                                                    <div class="reply-quote" onclick={handleReplyQuoteClick} data-id={msg.replyToId}>
                                                        <div class="reply-quote-sender">{msg.replyToSenderName}</div>
                                                        <div class="reply-quote-preview">{msg.replyToPreview}</div>
                                                    </div>
                                                </template>
                                                <span>{msg.displayContent}</span>
                                                <!-- Attachment -->
                                                <template lwc:if={msg.attachment}>
                                                    <template lwc:if={msg.attachment.isImage}>
                                                        <button
                                                            class="attachment-image"
                                                            onclick={handlePreviewFile}
                                                            data-id={msg.attachment.docId}
                                                            type="button">
                                                            <img class="attachment-thumb" src={msg.attachment.thumbUrl} alt={msg.attachment.title} />
                                                        </button>
                                                    </template>
                                                    <template lwc:else>
                                                        <button
                                                            class="attachment-file"
                                                            onclick={handlePreviewFile}
                                                            data-id={msg.attachment.docId}
                                                            type="button">
                                                            <lightning-icon icon-name="doctype:attachment" size="xx-small"></lightning-icon>
                                                            <span class="attachment-file-title slds-truncate">{msg.attachment.title}</span>
                                                            <span class="attachment-file-ext">{msg.attachment.extension}</span>
                                                        </button>
                                                    </template>
                                                </template>
                                            </div>

                                            <!-- Time (Right for Others) -->
                                            <template lwc:if={msg.showTimeRight}>
                                                <span class="message-meta-right">
                                                    <template lwc:if={msg.showUnreadCount}>
                                                        <span class="read-count">{msg.unreadByOthers}</span>
                                                    </template>
                                                    <span class="message-time right">{msg.formattedTime}</span>
                                                </span>
                                            </template>

                                            <!-- Message Actions (rightmost) -->
                                            <template lwc:if={msg.showActions}>
                                                <lightning-button-menu
                                                    class="msg-action-btn"
                                                    icon-name="utility:threedots_vertical"
                                                    variant="bare"
                                                    icon-size="x-small"
                                                    alternative-text={labels.msgMenuAlt}
                                                    menu-alignment={msg.actionsMenuAlignment}
                                                    data-id={msg.id}
                                                    onselect={handleMessageMenuSelect}>
                                                    <lightning-menu-item value="copy" label={labels.msgMenuCopy}></lightning-menu-item>
                                                    <lightning-menu-item value="reply" label={labels.msgMenuReply}></lightning-menu-item>
                                                </lightning-button-menu>
                                            </template>
                                        </template>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </template>
                </div>
                
                <div class="input-area">
                    <template lwc:if={isReplying}>
                        <div class="reply-draft">
                            <div class="reply-draft-left">
                                <div class="reply-draft-title">{labels.replyTitle}</div>
                                <div class="reply-draft-text">{replyDraftLabel}</div>
                            </div>
                            <lightning-button-icon
                                icon-name="utility:close"
                                variant="bare"
                                alternative-text={labels.replyCancelAlt}
                                title={labels.replyCancelTitle}
                                onclick={clearReplyDraft}>
                            </lightning-button-icon>
                        </div>
                    </template>

                    <div class="input-row">
                    <div class="file-upload-wrapper" title={labels.fileAttachTitle}>
                        <lightning-icon icon-name="utility:attach" size="x-small" class="visible-icon"></lightning-icon>
                        <lightning-file-upload
                            name="fileUploader"
                            accept=".png, .jpg, .jpeg, .gif, .webp, .bmp, .pdf"
                            record-id={currentSessionId}
                            onuploadfinished={handleUploadFinished}
                            variant="label-hidden"
                            class="hidden-upload">
                        </lightning-file-upload>
                    </div>

                    <lightning-textarea 
                        class="input-box" 
                        variant="label-hidden" 
                        placeholder={labels.msgInputPlaceholder} 
                        value={messageInput}
                        lwc:ref="chatInput"
                        onchange={handleInputChange}
                        onkeydown={handleInputKeyDown}
                        onpaste={handlePaste}
                        disabled={isLoading}
                        max-length="32000"
                        rows="1">
                    </lightning-textarea>
                    <lightning-button-icon icon-name="utility:send" variant="brand" onclick={handleSendMessage} disabled={isLoading}></lightning-button-icon>
                    </div>
                </div>
            </div>
        </template>

        <!-- People Modal (공용): 새 채팅방 만들기 / 참여자 초대 -->
        <template lwc:if={isPeopleModalOpen}>
            <div class="modal-overlay">
                <div class="modal-content">
                    <div class="modal-header people-modal-header">
                        <div class="people-modal-header-left">
                            <template lwc:if={isPeopleStep2}>
                                <lightning-button-icon icon-name="utility:back" variant="bare" onclick={peoplePrevStep} alternative-text={labels.backAlt}></lightning-button-icon>
                            </template>
                            <h2 class="slds-text-heading_medium">{peopleModalTitle}</h2>
                        </div>
                        <div class="people-modal-header-right">
                            <span class="people-step-indicator">{peopleStepLabel}</span>
                        </div>
                    </div>

                    <div class="modal-body">
                        <!-- Step 1: 검색 + 빠른 선택 -->
                        <template lwc:if={isPeopleStep1}>
                            <div class="slds-form-element">
                                <label class="slds-form-element__label">{labels.userSearchLabel}</label>
                                <div class="slds-form-element__control">
                                    <lightning-input type="search" variant="label-hidden" onchange={handlePeopleUserSearch} placeholder={labels.userSearchPlaceholder}></lightning-input>
                                </div>
                            </div>

                            <template lwc:if={peopleSearchResults.length}>
                                <ul class="people-results">
                                    <template for:each={peopleSearchResults} for:item="user">
                                        <li key={user.Id} class={user._rowClass} onclick={handlePeopleToggleUser} data-id={user.Id} data-name={user.Name}>
                                            <span class="slds-truncate">{user.Name}</span>
                                            <template lwc:if={user._selected}>
                                                <lightning-icon icon-name="utility:check" size="x-small"></lightning-icon>
                                            </template>
                                        </li>
                                    </template>
                                </ul>
                            </template>

                            <div class="people-summary">
                                <div class="people-summary-left">
                                    <span class="people-summary-title">{labels.selectedLabel}</span>
                                    <span class="people-summary-count">{selectedCountLabel}</span>
                                </div>
                                <lightning-button label={labels.nextBtn} variant="neutral" onclick={peopleNextStep} disabled={isPeopleNextDisabled}></lightning-button>
                            </div>
                        </template>

                        <!-- Step 2: 선택 관리 + 최종 확인 -->
                        <template lwc:if={isPeopleStep2}>
                                <template lwc:if={isPeopleCreateMode}>
                                <lightning-input label={labels.chatNameOptionalLabel} value={peopleChatName} onchange={handlePeopleChatNameChange}></lightning-input>
                                </template>

                            <div class="selected-users">
                                <div class="selected-users-header">
                                    {labels.selectedUsersTitle} <span class="selected-users-count">{selectedCountLabel}</span>
                                </div>
                                <div class="selected-users-body">
                                    <template lwc:if={peopleSelectedUsers.length}>
                                        <div class="pill-container">
                                            <template for:each={peopleSelectedUsers} for:item="user">
                                                <lightning-pill key={user.id} label={user.name} onremove={handlePeopleRemoveUser} data-id={user.id}></lightning-pill>
                                            </template>
                                        </div>
                                    </template>
                                    <template lwc:else>
                                        <div class="selected-users-empty">{labels.noUsersSelected}</div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div class="modal-footer slds-grid slds-grid_align-end">
                        <lightning-button label={labels.closeBtn} onclick={closePeopleModal} class="slds-m-right_small"></lightning-button>
                        <template lwc:if={isPeopleStep2}>
                            <lightning-button label={peoplePrimaryLabel} variant="brand" onclick={confirmPeopleAction} disabled={isPeopleConfirmDisabled}></lightning-button>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Rename Chat Name Modal -->
        <template lwc:if={isRenameModalOpen}>
            <div class="modal-overlay">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="slds-text-heading_medium">{labels.renameChatTitle}</h2>
                    </div>
                    <div class="modal-body">
                        <lightning-input label={labels.chatNameLabel} value={renameChatName} onchange={handleRenameNameChange}></lightning-input>
                    </div>
                    <div class="modal-footer slds-grid slds-grid_align-end">
                        <lightning-button label={labels.cancelBtn} onclick={closeRenameModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button label={labels.changeBtn} variant="brand" onclick={confirmRename} disabled={isLoading}></lightning-button>
                    </div>
                </div>
            </div>
        </template>


        <!-- Participants Modal -->
        <template lwc:if={isParticipantsModalOpen}>
            <div class="modal-overlay">
                <div class="modal-content participants-modal">
                    <div class="modal-header participants-modal-header">
                        <div class="participants-modal-title">
                            <h2 class="slds-text-heading_medium">{labels.participantsTitle}</h2>
                            <span class="participants-count">({participantCountLabel})</span>
                        </div>
                    </div>
                    <div class="modal-body participants-modal-body">
                        <template lwc:if={isParticipantsLoading}>
                            <div class="slds-p-around_medium slds-align_absolute-center">
                                <lightning-spinner size="small"></lightning-spinner>
                            </div>
                        </template>
                        <template lwc:else>
                            <template lwc:if={participants.length}>
                                <ul class="participants-list">
                                    <template for:each={participants} for:item="p">
                                        <li key={p.participantId} class={p.rowClass}>
                                            <div class="participants-left">
                                                <div class="participants-name">
                                                    {p.userName}
                                                    <template lwc:if={p.isMe}>
                                                        <span class="participants-me">{labels.meLabel}</span>
                                                    </template>
                                                </div>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </template>
                            <template lwc:else>
                                <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                                    {labels.noParticipants}
                                </div>
                            </template>
                        </template>
                    </div>
                    <div class="modal-footer slds-grid slds-grid_align-end">
                        <lightning-button label={labels.closeBtn} onclick={closeParticipantsModal}></lightning-button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
